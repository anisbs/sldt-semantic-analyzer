<!DOCTYPE html>
<!--
  Feature 4 + 5 — single static page, two tabs:
    Home  : KPI cards (models per status) + name filter + versions selector
    Graph : D3 force-directed view of the selected model version
  Reads web/data/graph/index.json (catalog) then <id>.json — paths relative
  to this page, so identical locally and on GitHub Pages.
  Local: python3 -m http.server 8000  ->  http://localhost:8000/web/
  Online: https://anisbs.github.io/sldt-semantic-analyzer/web/
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SLDT — Semantic Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; color: #222; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* Tabs */
    #tabs { display: flex; gap: 4px; padding: 8px 12px 0; border-bottom: 1px solid #ddd; background: #fafafa; }
    .tab {
      padding: 8px 16px; font-size: 13px; cursor: pointer; border: 1px solid #ddd;
      border-bottom: none; border-radius: 6px 6px 0 0; background: #f0f0f0; color: #555;
    }
    .tab.active { background: #fff; color: #111; font-weight: 600; }
    #views { flex: 1; position: relative; overflow: hidden; }
    .view { position: absolute; inset: 0; display: none; }
    .view.active { display: flex; }

    /* Home */
    #home { flex-direction: column; overflow-y: auto; padding: 16px 20px; gap: 16px; }
    #kpis { display: flex; gap: 12px; flex-wrap: wrap; }
    .kpi {
      min-width: 130px; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px;
      cursor: pointer; background: #fff; border-left: 5px solid #bbb;
    }
    .kpi:hover { background: #f7f7f7; }
    .kpi.sel { outline: 2px solid #4363d8; }
    .kpi .n { font-size: 24px; font-weight: 700; }
    .kpi .s { font-size: 12px; color: #666; text-transform: capitalize; }
    #catalog-head { display: flex; align-items: center; gap: 12px; }
    #search { flex: 1; max-width: 360px; padding: 7px 10px; font-size: 13px;
      border: 1px solid #ccc; border-radius: 6px; }
    #count { font-size: 12px; color: #888; }
    #catalog { display: flex; flex-direction: column; border: 1px solid #eee; border-radius: 8px; }
    .row {
      display: flex; align-items: center; gap: 12px; padding: 9px 14px;
      border-bottom: 1px solid #f0f0f0; font-size: 13px;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: #f7f9ff; }
    .row .nm { flex: 1; font-weight: 600; }
    .row .nm small { font-weight: 400; color: #999; }
    .badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; color: #fff; }
    .row select { font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 5px; }

    /* Graph */
    #graphview { }
    #main { flex: 1; position: relative; overflow: hidden; }
    #gbar {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.95); border: 1px solid #ddd; border-radius: 6px;
      padding: 6px 12px; font-size: 12px; z-index: 5; white-space: nowrap;
    }
    #legend {
      position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,.9);
      border: 1px solid #ddd; border-radius: 4px; padding: 8px 10px; font-size: 12px;
    }
    #legend div { display: flex; align-items: center; margin: 2px 0; }
    #legend span.dot { width: 11px; height: 11px; border-radius: 50%; margin-right: 6px; }
    .node circle { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
    .node text { font-size: 10px; fill: #333; pointer-events: none; }
    .link { stroke: #999; stroke-opacity: .6; }
    .link.optional { stroke-dasharray: 4 3; }
    .link-label { font-size: 9px; fill: #aaa; pointer-events: none; }
    #tooltip {
      position: absolute; pointer-events: none; background: #222; color: #fff;
      padding: 8px 10px; border-radius: 4px; font-size: 12px; max-width: 320px;
      opacity: 0; transition: opacity .1s; z-index: 10;
    }
    #tooltip .k { color: #9cf; }
    #empty { position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #999; font-size: 14px; }
  </style>
</head>
<body>
<div id="app">
  <div id="tabs">
    <div class="tab active" data-view="home">Home</div>
    <div class="tab" data-view="graphview">Graph</div>
  </div>
  <div id="views">
    <div id="home" class="view active">
      <div>
        <h1 style="margin:0 0 4px;font-size:18px;">SLDT — Semantic Analyzer</h1>
        <div style="font-size:12px;color:#888;">Models per status (per version file)</div>
      </div>
      <div id="kpis"></div>
      <div id="catalog-head">
        <input id="search" placeholder="Filter by model name (family, status, version…)" />
        <span id="count"></span>
      </div>
      <div id="catalog"></div>
    </div>

    <div id="graphview" class="view">
      <div id="main">
        <div id="gbar" style="display:none;"></div>
        <div id="legend"></div>
        <div id="empty">Pick a model from the Home tab.</div>
        <svg id="graph" width="100%" height="100%"></svg>
      </div>
    </div>
  </div>
</div>
<div id="tooltip"></div>

<script>
const KIND_COLORS = {
  Aspect: "#e6194b", Property: "#3cb44b", Characteristic: "#4363d8",
  Entity: "#f58231", AbstractEntity: "#911eb4", Operation: "#46f0f0",
  Event: "#f032e6", Constraint: "#bcf60c",
};
const color = k => KIND_COLORS[k] || "#999";

const STATUS_COLORS = {
  release: "#2e7d32", deprecated: "#b00020", draft: "#f9a825", undefined: "#9e9e9e",
};
const statusColor = s => STATUS_COLORS[s] || "#9e9e9e";

// ---- Tabs -----------------------------------------------------------------
function showTab(view) {
  d3.selectAll(".tab").classed("active", function () {
    return this.dataset.view === view;
  });
  d3.selectAll(".view").classed("active", function () {
    return this.id === view;
  });
}
d3.selectAll(".tab").on("click", function () { showTab(this.dataset.view); });

// ---- Graph (D3 force-directed) -------------------------------------------
const svg = d3.select("#graph");
const tooltip = d3.select("#tooltip");
const container = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.1, 4]).on("zoom",
  e => container.attr("transform", e.transform)));

// Directed arrow for edges
svg.append("defs").append("marker")
  .attr("id", "arrow").attr("viewBox", "0 -5 10 10").attr("refX", 18)
  .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
  .append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#999");

drawLegend();

let sim;
function draw(g) {
  document.getElementById("empty").style.display = "none";
  container.selectAll("*").remove();
  const { width, height } = svg.node().getBoundingClientRect();

  // Copies (D3 mutates objects, injecting resolved x/y/source/target)
  const nodes = g.nodes.map(d => ({ ...d }));
  const links = g.links.map(d => ({ ...d }));

  if (sim) sim.stop();
  sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(70))
    .force("charge", d3.forceManyBody().strength(-180))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide(22));

  const link = container.append("g").selectAll("line").data(links).enter()
    .append("line")
    .attr("class", d => "link" + (d.optional ? " optional" : ""))
    .attr("stroke-width", 1.2).attr("marker-end", "url(#arrow)");

  const linkLabel = container.append("g").selectAll("text").data(links).enter()
    .append("text").attr("class", "link-label").text(d => d.label);

  const node = container.append("g").selectAll("g").data(nodes).enter()
    .append("g").attr("class", "node")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(.3).restart();
        d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0);
        d.fx = null; d.fy = null; }));

  node.append("circle").attr("r", 9).attr("fill", d => color(d.kind))
    .on("mouseover", (e, d) => {
      tooltip.style("opacity", 1).html(
        `<span class="k">${d.kind}</span> — <b>${d.label}</b><br>` +
        (d.preferredName ? `<i>${d.preferredName}</i><br>` : "") +
        (d.description ? d.description.slice(0, 280) : ""));
    })
    .on("mousemove", e =>
      tooltip.style("left", (e.pageX + 14) + "px").style("top", (e.pageY + 8) + "px"))
    .on("mouseout", () => tooltip.style("opacity", 0));

  node.append("text").attr("x", 12).attr("y", 4).text(d => d.label);

  sim.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    linkLabel.attr("x", d => (d.source.x + d.target.x) / 2)
             .attr("y", d => (d.source.y + d.target.y) / 2);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

function drawLegend() {
  const l = d3.select("#legend");
  l.append("div").style("font-weight", "600").text("Node type");
  Object.entries(KIND_COLORS).forEach(([k, c]) =>
    l.append("div").html(`<span class="dot" style="background:${c}"></span>${k}`));
}

// Load one catalog entry: switch to Graph tab, then fetch + draw.
function openEntry(e) {
  showTab("graphview");
  const bar = document.getElementById("gbar");
  bar.style.display = "";
  bar.innerHTML =
    `<b>${e.model_name}</b> v${e.version} ` +
    `<span class="badge" style="background:${statusColor(e.status)}">${e.status}</span> ` +
    ` · ${e.family} · ${e.meta_model} · ${e.n_nodes} nodes · ${e.n_links} links`;
  fetch(`data/graph/${e.file}`).then(r => r.json()).then(draw);
}

// ---- Home (KPI + catalog) ------------------------------------------------
let allModels = [];
let statusFilter = null;

// descending semantic-ish version compare ("4.0.0" before "2.0.1")
function cmpVerDesc(a, b) {
  const pa = a.split(".").map(Number), pb = b.split(".").map(Number);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const x = pa[i] || 0, y = pb[i] || 0;
    if (x !== y) return y - x;
  }
  return 0;
}

fetch("data/graph/index.json")
  .then(r => r.json())
  .then(idx => { allModels = idx; renderKpis(); renderCatalog(); })
  .catch(() => {
    document.getElementById("empty").textContent =
      "index.json not found — generate it: python -m sldt_analyzer.graph";
    document.getElementById("catalog").textContent =
      "index.json not found — run: python -m sldt_analyzer.graph";
  });

function renderKpis() {
  const counts = d3.rollup(allModels, v => v.length, d => d.status);
  const order = ["release", "draft", "deprecated", "undefined"];
  const keys = order.filter(k => counts.has(k))
    .concat([...counts.keys()].filter(k => !order.includes(k)));
  const box = d3.select("#kpis");
  box.selectAll("*").remove();
  keys.forEach(k => {
    box.append("div")
      .attr("class", "kpi" + (statusFilter === k ? " sel" : ""))
      .style("border-left-color", statusColor(k))
      .html(`<div class="n">${counts.get(k)}</div><div class="s">${k}</div>`)
      .on("click", () => {
        statusFilter = statusFilter === k ? null : k;
        renderKpis(); renderCatalog();
      });
  });
}

function renderCatalog() {
  const q = (document.getElementById("search").value || "").toLowerCase();

  // group entries by model_name, sort versions descending
  const groups = [...d3.group(allModels, d => d.model_name).entries()]
    .map(([name, entries]) => ({
      name,
      entries: entries.slice().sort((a, b) => cmpVerDesc(a.version, b.version)),
    }))
    .sort((a, b) => a.name.localeCompare(b.name));

  // Status KPI filters the MODELS shown (those having >=1 version of that
  // status) but never removes versions from a model's dropdown.
  const visible = groups
    .filter(g => !statusFilter || g.entries.some(e => e.status === statusFilter))
    .filter(g =>
      !q ||
      g.name.toLowerCase().includes(q) ||
      g.entries.some(e =>
        e.family.toLowerCase().includes(q) ||
        e.status.toLowerCase().includes(q) ||
        e.version.toLowerCase().includes(q) ||
        (e.name || "").toLowerCase().includes(q)));

  d3.select("#count").text(
    `${visible.length} models · ${visible.reduce((n, g) => n + g.entries.length, 0)} versions`);

  const cat = d3.select("#catalog");
  cat.selectAll("*").remove();
  visible.forEach(g => {
    const row = cat.append("div").attr("class", "row");
    row.append("div").attr("class", "nm")
      .html(`${g.name} <small>· ${g.entries.length} version(s)</small>`);

    const sel = row.append("select");
    sel.append("option").attr("value", "").attr("disabled", true)
      .attr("selected", true).text("Open version…");
    g.entries.forEach((e, i) =>
      sel.append("option").attr("value", i)
        .text(`v${e.version} · ${e.family} · ${e.status}`));
    sel.on("change", function () {
      if (this.value !== "") openEntry(g.entries[+this.value]);
    });
  });
}

d3.select("#search").on("input", renderCatalog);
</script>
</body>
</html>
